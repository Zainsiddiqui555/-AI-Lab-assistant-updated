<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Lab Assistant</title>
<style>
:root {
  --bg: #0a0e1a;
  --surface: #141a2e;
  --surface2: #1c2340;
  --surface3: #242b4a;
  --primary: #4f8cff;
  --primary-hover: #6ba0ff;
  --accent: #00d4aa;
  --accent-hover: #00e8bb;
  --danger: #ff4757;
  --danger-hover: #ff6b7a;
  --text: #e8ecf4;
  --text-muted: #8892b0;
  --text-dim: #5a6488;
  --border: #2a3150;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --transition: 0.2s ease;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; overflow: hidden; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ─── Scrollbar ──────────────────────────────────────────── */

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

/* ─── Header ─────────────────────────────────────────────── */

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 10;
}

.header-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 18px;
  font-weight: 700;
}

.header-brand span { color: var(--primary); }

.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 6px;
}
.status-dot.online { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
.status-dot.offline { background: var(--danger); }
.status-dot.loading { background: #f0c040; animation: pulse 1s infinite; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.header-actions { display: flex; align-items: center; gap: 8px; }

.btn-icon {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  transition: all var(--transition);
}
.btn-icon:hover {
  background: var(--surface2);
  color: var(--text);
  border-color: var(--primary);
}

/* ─── Layout ─────────────────────────────────────────────── */

.app-layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ─── Sidebar ────────────────────────────────────────────── */

.sidebar {
  width: 300px;
  min-width: 300px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: margin var(--transition);
}
.sidebar.collapsed { margin-left: -300px; }

.sidebar-section {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}

.sidebar-section:last-child { border-bottom: none; flex: 1; overflow-y: auto; }

.section-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 12px;
  font-weight: 600;
}

/* ─── Upload Zone ────────────────────────────────────────── */

.upload-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 24px 16px;
  text-align: center;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
}
.upload-zone:hover { border-color: var(--primary); background: var(--surface2); }
.upload-zone.dragover { border-color: var(--accent); background: rgba(0,212,170,0.08); }
.upload-zone.has-file { border-color: var(--accent); border-style: solid; }
.upload-zone-icon { font-size: 28px; margin-bottom: 8px; }
.upload-zone-text { font-size: 13px; color: var(--text-muted); }
.upload-zone-text strong { color: var(--primary); }
.upload-zone input[type="file"] { display: none; }

.upload-progress {
  margin-top: 12px;
  display: none;
}
.upload-progress.active { display: block; }
.upload-progress-bar {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.upload-progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  border-radius: 2px;
  transition: width 0.3s;
}
.upload-progress-text {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
}

/* ─── Document List ──────────────────────────────────────── */

.doc-list { display: flex; flex-direction: column; gap: 6px; }

.doc-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 10px;
  background: var(--surface2);
  border-radius: var(--radius-sm);
  border: 1px solid transparent;
  transition: all var(--transition);
}
.doc-item:hover { border-color: var(--border); }

.doc-item-info {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
  flex: 1;
}

.doc-item-icon { font-size: 16px; flex-shrink: 0; }

.doc-item-name {
  font-size: 13px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.doc-item-meta {
  font-size: 11px;
  color: var(--text-dim);
  flex-shrink: 0;
}

.doc-item-delete {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  padding: 2px 4px;
  border-radius: 4px;
  font-size: 14px;
  transition: all var(--transition);
  flex-shrink: 0;
}
.doc-item-delete:hover { color: var(--danger); background: rgba(255,71,87,0.1); }

.empty-state {
  text-align: center;
  padding: 20px;
  color: var(--text-dim);
  font-size: 13px;
}

/* ─── Webhook Config ─────────────────────────────────────── */

.webhook-form { display: flex; flex-direction: column; gap: 8px; }

.webhook-form input,
.webhook-form select {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: var(--font);
  outline: none;
  transition: border var(--transition);
}
.webhook-form input:focus { border-color: var(--primary); }
.webhook-form input::placeholder { color: var(--text-dim); }

.webhook-list { margin-top: 10px; display: flex; flex-direction: column; gap: 4px; }

.webhook-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 8px;
  background: var(--surface2);
  border-radius: var(--radius-sm);
  font-size: 12px;
}
.webhook-item-url { color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }

/* ─── Main Chat ──────────────────────────────────────────── */

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.chat-header {
  padding: 10px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.chat-header-title { font-size: 13px; color: var(--text-muted); }
.chat-header-count { font-size: 12px; color: var(--text-dim); }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.message {
  display: flex;
  flex-direction: column;
  max-width: 85%;
  animation: fadeIn 0.3s ease;
}
.message.user { align-self: flex-end; }
.message.assistant { align-self: flex-start; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.message-bubble {
  padding: 12px 16px;
  border-radius: var(--radius);
  font-size: 14px;
  line-height: 1.6;
  word-wrap: break-word;
  white-space: pre-wrap;
}

.message.user .message-bubble {
  background: var(--primary);
  color: #fff;
  border-bottom-right-radius: 4px;
}

.message.assistant .message-bubble {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}

.message-sources {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 4px;
  padding: 0 4px;
}
.message-sources strong { color: var(--text-muted); }

/* Markdown in messages */
.message-bubble p { margin: 0 0 8px; }
.message-bubble p:last-child { margin-bottom: 0; }
.message-bubble code {
  background: rgba(0,0,0,0.3);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 13px;
  font-family: 'Cascadia Code', 'Fira Code', monospace;
}
.message-bubble pre {
  background: rgba(0,0,0,0.4);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  overflow-x: auto;
  margin: 8px 0;
}
.message-bubble pre code {
  background: none;
  padding: 0;
  font-size: 13px;
}
.message-bubble table {
  border-collapse: collapse;
  width: 100%;
  margin: 8px 0;
  font-size: 13px;
}
.message-bubble th, .message-bubble td {
  border: 1px solid var(--border);
  padding: 6px 10px;
  text-align: left;
}
.message-bubble th { background: var(--surface3); }
.message-bubble ul, .message-bubble ol { padding-left: 20px; margin: 4px 0; }
.message-bubble li { margin: 2px 0; }

.typing-indicator {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 0;
}
.typing-indicator span {
  width: 6px; height: 6px;
  background: var(--text-muted);
  border-radius: 50%;
  animation: typing 1.4s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing {
  0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
  30% { opacity: 1; transform: translateY(-4px); }
}

/* ─── Input Area ─────────────────────────────────────────── */

.chat-input {
  padding: 12px 20px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.chat-input-form {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 12px;
  transition: border var(--transition);
}
.chat-input-form:focus-within { border-color: var(--primary); }

.chat-input-text {
  flex: 1;
  background: none;
  border: none;
  color: var(--text);
  font-size: 14px;
  font-family: var(--font);
  outline: none;
  resize: none;
  min-height: 24px;
  max-height: 120px;
  line-height: 1.5;
}
.chat-input-text::placeholder { color: var(--text-dim); }

.chat-input-actions { display: flex; align-items: center; gap: 4px; }

.btn-send {
  background: var(--primary);
  border: none;
  color: #fff;
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  transition: all var(--transition);
  flex-shrink: 0;
}
.btn-send:hover { background: var(--primary-hover); }
.btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-attach {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  padding: 6px;
  border-radius: var(--radius-sm);
  font-size: 16px;
  transition: all var(--transition);
}
.btn-attach:hover { color: var(--text); background: var(--surface3); }

/* ─── Buttons ────────────────────────────────────────────── */

.btn {
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  border: none;
  font-size: 13px;
  font-family: var(--font);
  cursor: pointer;
  transition: all var(--transition);
  font-weight: 500;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-accent { background: var(--accent); color: #0a0e1a; }
.btn-accent:hover { background: var(--accent-hover); }
.btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
.btn-danger:hover { background: rgba(255,71,87,0.1); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-block { width: 100%; }

/* ─── Toast ──────────────────────────────────────────────── */

.toast-container {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  font-size: 13px;
  box-shadow: var(--shadow);
  animation: slideIn 0.3s ease;
  max-width: 360px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.toast-success { border-left: 3px solid var(--accent); }
.toast-error { border-left: 3px solid var(--danger); }
.toast-info { border-left: 3px solid var(--primary); }

@keyframes slideIn {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}

/* ─── Modal ──────────────────────────────────────────────── */

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 9998;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.2s ease;
}
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  min-width: 320px;
  max-width: 480px;
  box-shadow: var(--shadow);
}
.modal h3 { margin-bottom: 12px; font-size: 16px; }
.modal p { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

/* ─── Responsive ─────────────────────────────────────────── */

@media (max-width: 768px) {
  .sidebar {
    position: fixed;
    left: 0;
    top: 60px;
    bottom: 0;
    z-index: 100;
    margin-left: -300px;
  }
  .sidebar.open { margin-left: 0; }
  .sidebar-toggle { display: flex !important; }
  .message { max-width: 95%; }
}

.sidebar-toggle { display: none; }

/* ─── Utility ────────────────────────────────────────────── */

.hidden { display: none !important; }
.flex { display: flex; }
.items-center { align-items: center; }
.gap-2 { gap: 8px; }
.mt-2 { margin-top: 8px; }
.text-sm { font-size: 13px; }
.text-dim { color: var(--text-dim); }
.text-center { text-align: center; }
.truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:12px">
    <button class="btn-icon sidebar-toggle" onclick="toggleSidebar()" title="Toggle sidebar">
      ☰
    </button>
    <div class="header-brand">
      <span>⚗</span> AI Lab Assistant
    </div>
  </div>
  <div class="header-actions">
    <span class="text-sm text-dim"><span class="status-dot online" id="statusDot"></span><span id="statusText">Online</span></span>
    <button class="btn-icon" onclick="refreshDocs()" title="Refresh">↻</button>
  </div>
</div>

<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">

    <!-- Upload -->
    <div class="sidebar-section">
      <div class="section-title">Upload Document</div>
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
        <div class="upload-zone-icon">📄</div>
        <div class="upload-zone-text">
          Drop PDF here or <strong>browse</strong>
        </div>
        <input type="file" id="fileInput" accept=".pdf" />
        <div class="upload-progress" id="uploadProgress">
          <div class="upload-progress-bar">
            <div class="upload-progress-fill" id="uploadProgressFill"></div>
          </div>
          <div class="upload-progress-text" id="uploadProgressText">Processing…</div>
        </div>
      </div>
    </div>

    <!-- Documents -->
    <div class="sidebar-section" style="flex:1;overflow-y:auto">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div class="section-title" style="margin-bottom:0">Documents</div>
        <button class="btn btn-sm btn-danger" onclick="confirmClearAll()" title="Remove all documents">Clear all</button>
      </div>
      <div class="doc-list" id="docList">
        <div class="empty-state">No documents uploaded yet</div>
      </div>
    </div>

    <!-- Webhook -->
    <div class="sidebar-section">
      <div class="section-title">Webhook Config</div>
      <div class="webhook-form">
        <input type="url" id="webhookUrl" placeholder="https://example.com/webhook" />
        <input type="text" id="webhookLabel" placeholder="Label (e.g., lab-server)" />
        <button class="btn btn-accent btn-block" onclick="registerWebhook()">Register Webhook</button>
      </div>
      <div class="webhook-list" id="webhookList"></div>
    </div>

  </aside>

  <!-- Main -->
  <div class="main">
    <div class="chat-header">
      <div class="chat-header-title">Ask anything about your lab documents</div>
      <div class="chat-header-count" id="docCount">0 documents</div>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="message assistant">
        <div class="message-bubble">
          Welcome to the AI Lab Assistant. Upload PDF documents to get started, then ask me anything about their contents.
        </div>
      </div>
    </div>

    <div class="chat-input">
      <form class="chat-input-form" id="chatForm" onsubmit="return sendMessage(event)">
        <textarea class="chat-input-text" id="chatInput" rows="1" placeholder="Ask a lab question…" oninput="autoResize(this)"></textarea>
        <div class="chat-input-actions">
          <button type="button" class="btn-attach" onclick="document.getElementById('fileInput').click()" title="Attach PDF">📎</button>
          <button type="submit" class="btn-send" id="sendBtn">➤</button>
        </div>
      </form>
    </div>
  </div>

</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ─── State ────────────────────────────────────────────────────

const API_BASE = window.location.origin;
let documents = [];
let webhooks = [];
let isProcessing = false;

// ─── Toast ────────────────────────────────────────────────────

function toast(message, type = 'info') {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = message;
  container.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateX(20px)'; el.style.transition = '0.3s'; setTimeout(() => el.remove(), 300); }, 4000);
}

// ─── Sidebar ──────────────────────────────────────────────────

function toggleSidebar() {
  const s = document.getElementById('sidebar');
  s.classList.toggle('open');
  s.classList.toggle('collapsed');
}

// ─── Auto-resize textarea ─────────────────────────────────────

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ─── Markdown Renderer ────────────────────────────────────────

function renderMarkdown(text) {
  if (!text) return '';
  let html = text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/### (.+)/g, '<h4>$1</h4>')
    .replace(/## (.+)/g, '<h3>$1</h3>')
    .replace(/# (.+)/g, '<h2>$1</h2>')
    .replace(/^- (.+)/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>')
    .replace(/\|(.+)\|/g, (m) => {
      const cells = m.split('|').filter(c => c.trim());
      if (cells.some(c => /^[-:]+$/.test(c.trim()))) return '';
      return '<tr><td>' + cells.join('</td><td>') + '</td></tr>';
    })
    .replace(/(<tr>.*<\/tr>\n?)+/g, '<table>$&</table>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
  return '<p>' + html + '</p>';
}

// ─── Chat ─────────────────────────────────────────────────────

function addMessage(role, content, sources) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `message ${role}`;

  const bubble = document.createElement('div');
  bubble.className = 'message-bubble';
  bubble.innerHTML = role === 'user' ? content.replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>') : renderMarkdown(content);
  div.appendChild(bubble);

  if (sources && sources.length > 0) {
    const src = document.createElement('div');
    src.className = 'message-sources';
    src.innerHTML = '<strong>Sources:</strong> ' + sources.join(', ');
    div.appendChild(src);
  }

  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function addTypingIndicator() {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'message assistant';
  div.id = 'typingIndicator';
  div.innerHTML = '<div class="message-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTypingIndicator() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function setProcessing(state) {
  isProcessing = state;
  document.getElementById('sendBtn').disabled = state;
  document.getElementById('chatInput').disabled = state;
}

// ─── Send Message ─────────────────────────────────────────────

async function sendMessage(e) {
  e.preventDefault();
  const input = document.getElementById('chatInput');
  const question = input.value.trim();
  if (!question || isProcessing) return;

  input.value = '';
  input.style.height = 'auto';
  addMessage('user', question);
  setProcessing(true);
  addTypingIndicator();

  try {
    const res = await fetch(`${API_BASE}/ask`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || `HTTP ${res.status}`);
    }
    const data = await res.json();
    removeTypingIndicator();
    addMessage('assistant', data.answer, data.sources);
    if (data.chunks_retrieved === 0) {
      toast('No relevant documents found. Upload a PDF first.', 'info');
    }
  } catch (err) {
    removeTypingIndicator();
    addMessage('assistant', '**Error:** ' + err.message);
    toast(err.message, 'error');
  }
  setProcessing(false);
}

// ─── Upload ───────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
  const zone = document.getElementById('uploadZone');
  const input = document.getElementById('fileInput');

  zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => { zone.classList.remove('dragover'); });
  zone.addEventListener('drop', (e) => {
    e.preventDefault();
    zone.classList.remove('dragover');
    const files = Array.from(e.dataTransfer.files).filter(f => f.name.toLowerCase().endsWith('.pdf'));
    if (files.length > 0) uploadFile(files[0]);
    else toast('Only PDF files are accepted', 'error');
  });
  input.addEventListener('change', () => {
    if (input.files.length > 0) uploadFile(input.files[0]);
  });
});

async function uploadFile(file) {
  const zone = document.getElementById('uploadZone');
  const progress = document.getElementById('uploadProgress');
  const fill = document.getElementById('uploadProgressFill');
  const text = document.getElementById('uploadProgressText');

  zone.classList.add('has-file');
  progress.classList.add('active');
  fill.style.width = '10%';
  text.textContent = `Uploading ${file.name}…`;

  const form = new FormData();
  form.append('file', file);

  try {
    const res = await fetch(`${API_BASE}/upload`, {
      method: 'POST',
      body: form,
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || `Upload failed (HTTP ${res.status})`);
    }
    fill.style.width = '100%';
    text.textContent = 'Indexing complete!';
    toast(`Indexed "${file.name}" successfully`, 'success');
    setTimeout(() => {
      progress.classList.remove('active');
      zone.classList.remove('has-file');
      fill.style.width = '0%';
    }, 2000);
    refreshDocs();
  } catch (err) {
    fill.style.width = '0%';
    progress.classList.remove('active');
    zone.classList.remove('has-file');
    toast(err.message, 'error');
    text.textContent = err.message;
  }
}

// ─── Documents ────────────────────────────────────────────────

async function refreshDocs() {
  try {
    const res = await fetch(`${API_BASE}/documents`);
    if (!res.ok) throw new Error('Failed to fetch documents');
    documents = await res.json();
    renderDocs();
  } catch (err) {
    toast(err.message, 'error');
  }
}

function renderDocs() {
  const list = document.getElementById('docList');
  const count = document.getElementById('docCount');
  count.textContent = `${documents.length} document${documents.length !== 1 ? 's' : ''}`;

  if (documents.length === 0) {
    list.innerHTML = '<div class="empty-state">No documents uploaded yet</div>';
    return;
  }

  list.innerHTML = documents.map(d => `
    <div class="doc-item">
      <div class="doc-item-info">
        <span class="doc-item-icon">📄</span>
        <span class="doc-item-name" title="${d.filename}">${d.filename}</span>
        <span class="doc-item-meta">${d.chunks} chunks</span>
      </div>
      <button class="doc-item-delete" onclick="deleteDoc('${d.doc_id}')" title="Delete">✕</button>
    </div>
  `).join('');
}

async function deleteDoc(docId) {
  try {
    const res = await fetch(`${API_BASE}/documents/${docId}`, { method: 'DELETE' });
    if (!res.ok) throw new Error('Delete failed');
    toast('Document removed', 'success');
    refreshDocs();
  } catch (err) {
    toast(err.message, 'error');
  }
}

function confirmClearAll() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h3>⚠ Clear All Documents</h3>
      <p>This will permanently remove all indexed documents and chunks from the vector database. This cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn btn-danger" onclick="clearAllDocs(); this.closest('.modal-overlay').remove()">Delete All</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
}

async function clearAllDocs() {
  try {
    const res = await fetch(`${API_BASE}/documents`, { method: 'DELETE' });
    if (!res.ok) throw new Error('Clear failed');
    toast('All documents cleared', 'success');
    refreshDocs();
  } catch (err) {
    toast(err.message, 'error');
  }
}

// ─── Webhooks ─────────────────────────────────────────────────

async function registerWebhook() {
  const url = document.getElementById('webhookUrl').value.trim();
  const label = document.getElementById('webhookLabel').value.trim();
  if (!url) { toast('Enter a webhook URL', 'error'); return; }
  try {
    const res = await fetch(`${API_BASE}/webhook/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, label: label || undefined }),
    });
    if (!res.ok) throw new Error('Registration failed');
    const data = await res.json();
    toast(`Webhook registered: ${data.webhook_id.slice(0, 8)}…`, 'success');
    document.getElementById('webhookUrl').value = '';
    document.getElementById('webhookLabel').value = '';
    refreshWebhooks();
  } catch (err) {
    toast(err.message, 'error');
  }
}

async function refreshWebhooks() {
  try {
    const res = await fetch(`${API_BASE}/webhook/registry`);
    if (!res.ok) return;
    webhooks = (await res.json()).webhooks || [];
    renderWebhooks();
  } catch {}
}

function renderWebhooks() {
  const list = document.getElementById('webhookList');
  if (webhooks.length === 0) {
    list.innerHTML = '';
    return;
  }
  list.innerHTML = webhooks.map(w => `
    <div class="webhook-item">
      <span class="webhook-item-url" title="${w.url}">${w.label || w.url}</span>
      <button class="doc-item-delete" onclick="deleteWebhook('${w.id}')" title="Remove">✕</button>
    </div>
  `).join('');
}

async function deleteWebhook(id) {
  try {
    const res = await fetch(`${API_BASE}/webhook/registry/${id}`, { method: 'DELETE' });
    if (!res.ok) throw new Error('Delete failed');
    toast('Webhook removed', 'success');
    refreshWebhooks();
  } catch (err) {
    toast(err.message, 'error');
  }
}

// ─── Health Check ─────────────────────────────────────────────

async function checkHealth() {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  try {
    const res = await fetch(`${API_BASE}/health`);
    if (!res.ok) throw new Error('Unhealthy');
    const data = await res.json();
    dot.className = 'status-dot online';
    text.textContent = `${data.documents_indexed} docs, ${data.chunks_indexed} chunks`;
  } catch {
    dot.className = 'status-dot offline';
    text.textContent = 'Offline';
  }
}

// ─── Keyboard ─────────────────────────────────────────────────

document.getElementById('chatInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    document.getElementById('chatForm').dispatchEvent(new Event('submit'));
  }
});

// ─── Init ─────────────────────────────────────────────────────

refreshDocs();
refreshWebhooks();
checkHealth();
setInterval(checkHealth, 30000);
</script>
